# Build and deploy the documentation site to GitHub Pages.
#
# Every KDL example in the docs is parsed by the real config crate first
# (crates/config/tests/docs_examples.rs), so a page that drifts from the
# shipped tool fails the deploy.

name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "crates/config/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate the KDL examples in the docs
        run: cargo test -p miditool-config --test docs_examples

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the site
        uses: withastro/action@v3
        with:
          path: ./docs
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
