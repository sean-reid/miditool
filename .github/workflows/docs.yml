# Build and deploy the documentation site to GitHub Pages.
#
# Every KDL example in the docs is parsed by the real config crate first
# (crates/config/tests/docs_examples.rs), so a page that drifts from the
# shipped tool fails the deploy.
#
# Deployment is branch-based on purpose: the site is pushed to gh-pages
# and served from there. The Pages deployments API (actions/deploy-pages)
# intermittently rejects freshly created deployments with "try again
# later" (actions/deploy-pages#406), which broke most deploys here; a
# plain branch push avoids that API entirely.

name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "crates/config/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate the KDL examples in the docs
        run: cargo test -p miditool-config --test docs_examples

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Build the site
        run: npm ci && npm run build
        working-directory: docs
      - name: Publish to the gh-pages branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist
          force_orphan: true
