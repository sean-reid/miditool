# Called by the release pipeline after every asset is uploaded. The
# release was created as a draft by release-please, which keeps
# `releases/latest` (and the installer URL built on it) pointing at the
# previous release until the new binaries actually exist. This flips the
# finished release public.

name: publish-release

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish the drafted release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAN: ${{ inputs.plan }}
        run: |
          tag=$(printf '%s' "$PLAN" | jq -r '.announcement_tag')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "no announcement tag in the plan; nothing to publish"
            exit 0
          fi
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          echo "published $tag"
