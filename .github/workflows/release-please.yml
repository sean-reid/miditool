name: release-please

on:
  push:
    branches: [main]
  # Manual refresh, plus the automatic one: when the Release pipeline
  # finishes (publishing the draft and creating its tag), rerun so the
  # deferred release PR is generated against a real boundary.
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  # actions: write lets the "Dispatch the binary build" step below start
  # the release workflow with `gh workflow run`.
  actions: write

jobs:
  release-please:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      prs_created: ${{ steps.rp.outputs.prs_created }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      # release-please manages the version PR and CHANGELOG.md only; the
      # tag and GitHub release are created by cargo-dist together with the
      # binaries (atomic, so `releases/latest` is never asset-less).
      # Between a release merge and dist finishing, no new tag exists yet,
      # so a release PR generated in that window would diff against the
      # wrong boundary: defer it (the workflow_run trigger reruns us when
      # the Release pipeline completes).
      - name: Gate and detect a release merge
        id: gate
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          version=""
          case "$HEAD_MESSAGE" in
            "chore(main): release "*)
              version=$(printf '%s' "$HEAD_MESSAGE" | head -1 | sed -E 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
              ;;
          esac
          if [ -n "$version" ]; then
            echo "skip_pr=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "release merge for $version: deferring PR generation, dispatching the build"
          else
            echo "skip_pr=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-pull-request: ${{ steps.gate.outputs.skip_pr == 'true' }}
      # Tags made with GITHUB_TOKEN cannot trigger workflows, so the
      # binary build is dispatched explicitly; dist creates the tag and
      # release when the binaries are ready.
      - name: Dispatch the binary build
        if: steps.gate.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh workflow run release.yml
          --repo ${{ github.repository }}
          -f tag=v${{ steps.gate.outputs.version }}

  # The version bump lands in Cargo.toml; the lockfile must follow so
  # release builds with --locked succeed.
  lockfile:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Refresh the lockfile
        run: cargo update --workspace
      - name: Commit if changed
        run: |
          if ! git diff --quiet Cargo.lock; then
            git config user.name "Sean Reid"
            git config user.email "seanreid.mail@gmail.com"
            git add Cargo.lock
            git commit -m "chore: refresh lockfile"
            git push
          fi
