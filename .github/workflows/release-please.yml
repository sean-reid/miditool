name: release-please

on:
  push:
    branches: [main]
  # Manual refresh: a release PR generated while the previous release was
  # still a building draft shows a full-history changelog until rerun.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # actions: write lets the "Dispatch the binary build" step below start
  # the release workflow with `gh workflow run`.
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      prs_created: ${{ steps.rp.outputs.prs_created }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      # A release PR generated while a drafted release is still building
      # has no tag to diff against and degrades to a full-history
      # changelog. Skip PR generation whenever a draft is pending or this
      # very push is the release merge (its draft is created in this run);
      # the publish-release workflow redispatches after the tag exists.
      - name: Decide whether a release PR can be generated safely
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          drafts=$(gh release list --repo "$GITHUB_REPOSITORY" --json isDraft -q '[.[] | select(.isDraft)] | length')
          case "$HEAD_MESSAGE" in
            "chore(main): release"*) merge=true ;;
            *) merge=false ;;
          esac
          if [ "$drafts" != "0" ] || [ "$merge" = "true" ]; then
            echo "skip_pr=true" >> "$GITHUB_OUTPUT"
            echo "deferring release PR generation (drafts pending: $drafts, release merge: $merge)"
          else
            echo "skip_pr=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-pull-request: ${{ steps.gate.outputs.skip_pr == 'true' }}
      # Tags made with GITHUB_TOKEN cannot trigger workflows, so the
      # binary build is dispatched explicitly when a release is cut.
      - name: Dispatch the binary build
        if: steps.rp.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh workflow run release.yml
          --repo ${{ github.repository }}
          -f tag=${{ steps.rp.outputs.tag_name }}

  # The version bump lands in Cargo.toml; the lockfile must follow so
  # release builds with --locked succeed.
  lockfile:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Refresh the lockfile
        run: cargo update --workspace
      - name: Commit if changed
        run: |
          if ! git diff --quiet Cargo.lock; then
            git config user.name "Sean Reid"
            git config user.email "seanreid.mail@gmail.com"
            git add Cargo.lock
            git commit -m "chore: refresh lockfile"
            git push
          fi
