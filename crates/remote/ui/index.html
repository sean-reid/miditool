<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e9e6df">
  <title>miditool remote</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="top">
    <span class="wordmark">miditool</span>
    <span class="dropped" data-testid="dropped" hidden></span>
    <span class="conn-label" data-testid="conn-label" hidden>reconnecting</span>
    <span class="dot" data-testid="conn-dot" data-state="closed" role="status" aria-label="connection"></span>
  </header>

  <main class="column">
    <section class="scenes" data-testid="scenes" aria-label="scenes"></section>

    <section class="monitor-panel" aria-label="monitor">
      <h2 class="panel-title">monitor</h2>
      <ol class="monitor" data-testid="monitor"></ol>
    </section>
  </main>

  <footer class="panic-bar">
    <button class="panic" data-testid="panic" type="button">PANIC</button>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
