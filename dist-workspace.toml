[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Trigger releases by workflow dispatch instead of tag push, because the
# v-tag is created by release-please with a token whose events cannot
# start workflows
dispatch-releases = true
# release-please creates the GitHub Release; dist only uploads assets to it
create-release = false
# After assets upload, a custom job publishes the draft release that
# release-please created, so `releases/latest` never points at a release
# without binaries
post-announce-jobs = ["./publish-release"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

# System packages the Linux builders need
[dist.dependencies.apt]
libasound2-dev = "*"
libdbus-1-dev = "*"
