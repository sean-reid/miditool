  <circle cx="16" cy="9.6" r="2.3" fill="#171512"/>
  <circle cx="11.47" cy="11.47" r="2.3" fill="#171512"/>
  <circle cx="20.53" cy="11.47" r="2.3" fill="#171512"/>
  <circle cx="9.6" cy="16" r="2.3" fill="#171512"/>
  <circle cx="22.4" cy="16" r="2.3" fill="#171512"/>
</svg>
